name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip
            binary_name: cnet.exe
            package_name: cnet-windows-x64
            use_cross: false
          - label: windows-arm64
            os: windows-latest
            target: aarch64-pc-windows-msvc
            archive_ext: zip
            binary_name: cnet.exe
            package_name: cnet-windows-arm64
            use_cross: false
          - label: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
            binary_name: cnet
            package_name: cnet-linux-x64
            use_cross: false
          - label: linux-x86
            os: ubuntu-latest
            target: i686-unknown-linux-gnu
            archive_ext: tar.gz
            binary_name: cnet
            package_name: cnet-linux-x86
            use_cross: true
          - label: linux-arm64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive_ext: tar.gz
            binary_name: cnet
            package_name: cnet-linux-arm64
            use_cross: true
          - label: linux-armv7
            os: ubuntu-latest
            target: armv7-unknown-linux-gnueabihf
            archive_ext: tar.gz
            binary_name: cnet
            package_name: cnet-linux-armv7
            use_cross: true
          - label: macos-intel
            os: macos-13
            target: x86_64-apple-darwin
            archive_ext: tar.gz
            binary_name: cnet
            package_name: cnet-macos-intel
            use_cross: false
          - label: macos-apple-silicon
            os: macos-14
            target: aarch64-apple-darwin
            archive_ext: tar.gz
            binary_name: cnet
            package_name: cnet-macos-apple-silicon
            use_cross: false

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build release binary
        shell: bash
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target "${{ matrix.target }}"
          else
            cargo build --release --target "${{ matrix.target }}"
          fi

      - name: Prepare archive contents
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          ARCHIVE_BASENAME="${{ matrix.package_name }}-${VERSION}"
          PACKAGE_DIR="dist/${ARCHIVE_BASENAME}"
          mkdir -p "$PACKAGE_DIR"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "$PACKAGE_DIR/"
          cp README.md "$PACKAGE_DIR/"

          if [ "${{ matrix.archive_ext }}" = "zip" ]; then
            7z a "dist/${ARCHIVE_BASENAME}.zip" "$PACKAGE_DIR/*"
          else
            tar -czf "dist/${ARCHIVE_BASENAME}.tar.gz" -C dist "${ARCHIVE_BASENAME}"
          fi

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.zip
            dist/*.tar.gz
